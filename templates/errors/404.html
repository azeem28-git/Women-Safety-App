<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - SafeHer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff5f7;font-family:'DM Sans',sans-serif;}
        .error-wrap{text-align:center;padding:3rem;}
        .error-num{font-size:6rem;font-weight:800;color:#e91e63;line-height:1;}
        .error-title{font-size:1.5rem;font-weight:700;margin:1rem 0 .5rem;}
        .btn-home{background:#e91e63;color:white;padding:.75rem 2rem;border-radius:50px;text-decoration:none;font-weight:600;}
    </style>
</head>
<body>
<div class="error-wrap">
    <div class="error-num">404</div>
    <h2 class="error-title">Page Not Found</h2>
    <p class="text-muted mb-4">The page you're looking for doesn't exist.</p>
    <a href="/" class="btn-home">Go Home</a>
</div>
</body>
</html>
