<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SafeHer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">
<div class="admin-login-wrap">
    <div class="admin-login-card">
        <div class="text-center mb-4">
            <div class="admin-login-icon"><i class="bi bi-shield-lock-fill"></i></div>
            <h3 class="mt-3 fw-700">Admin Portal</h3>
            <p class="text-muted">SafeHer Administration Panel</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}{% endif %}{% endwith %}
        <form method="POST">
            <div class="form-group mb-3">
                <label class="form-label fw-600">Username</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-person-fill input-icon"></i>
                    <input type="text" name="username" class="form-control auth-input" placeholder="admin" required>
                </div>
            </div>
            <div class="form-group mb-4">
                <label class="form-label fw-600">Password</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" name="password" class="form-control auth-input" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-auth-submit">
                <i class="bi bi-shield-check me-2"></i>Access Admin Panel
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-muted small">← Back to User Login</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
